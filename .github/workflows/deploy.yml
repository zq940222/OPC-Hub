name: Deploy

on:
  workflow_run:
    workflows:
      - Docker Publish
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      app_domain:
        description: "Production domain for audit visibility only. Runtime uses the server .env file."
        required: false
        type: string
      image_tag:
        description: "Image tag to deploy"
        required: true
        default: latest
        type: string

env:
  IMAGE: ghcr.io/zq940222/opc-hub

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: ${{ github.event.inputs.app_domain && format('https://{0}', github.event.inputs.app_domain) || vars.PRODUCTION_URL }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export OPC_HUB_IMAGE_TAG="${{ github.event.inputs.image_tag || 'latest' }}"
            cat > docker-compose.yml <<'COMPOSE'
            services:
              app:
                image: ghcr.io/zq940222/opc-hub:${OPC_HUB_IMAGE_TAG:-latest}
                container_name: opc-hub-app
                restart: unless-stopped
                ports:
                  - "${APP_PORT:-3004}:3004"
                env_file:
                  - .env
                extra_hosts:
                  - "host.docker.internal:host-gateway"
                command: sh -c "bunx prisma migrate deploy && bun run db:seed && bun run start"
            COMPOSE
            test -f .env
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
